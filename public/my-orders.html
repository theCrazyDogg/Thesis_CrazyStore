<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders - Crazy Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1147679ae7.js" crossorigin="anonymous"></script>
    <style>
        .order-card { background: var(--panel); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 10px; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status.Pending { background: #f1c40f; color: black; }
        .status.Shipped { background: #3498db; color: white; }
        .status.Delivered { background: #2ecc71; color: white; }
        .status.Cancelled { background: #ff4757; color: white; }
        .order-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; color: var(--muted); }
        .btn-cancel { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px;}
        .btn-cancel:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <header id="site-header">
        <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Logo"></a></div>
        <nav class="menu"><ul><li><a href="index.html">Back to Home</a></li></ul></nav>
    </header>

    <main id="content" style="margin-top: 100px; max-width: 800px; margin-left: auto; margin-right: auto;">
        <h2>My Order History</h2>
        <div id="orders-list" style="margin-top: 20px;">Loading...</div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('crazy_user'));

        async function loadOrders() {
            if(!user) return window.location.href = 'login.html';

            const res = await fetch(`/api/my-orders/${user.id}`);
            const orders = await res.json();
            const container = document.getElementById('orders-list');

            if(orders.length === 0) {
                container.innerHTML = '<p>You have no orders yet.</p>';
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <strong>Order #${order._id.slice(-6).toUpperCase()}</strong><br>
                            <small>${new Date(order.createdAt).toLocaleString()}</small>
                        </div>
                        <div style="text-align: right;">
                            <span class="status ${order.status}">${order.status}</span><br>
                            <span style="color: var(--accent); font-weight: bold;">$${order.total_amount.toFixed(2)}</span>
                            ${order.status === 'Pending' ? `<br><button class="btn-cancel" onclick="cancelOrder('${order._id}')">Cancel Order</button>` : ''}
                        </div>
                    </div>
                    <div class="order-body">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span><img src="${item.image_url}" style="width:30px; vertical-align:middle; margin-right:5px;"> ${item.name} (x${item.quantity})</span>
                                <span>$${item.price.toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function cancelOrder(orderId) {
            if(!confirm("Are you sure you want to cancel this order?")) return;

            try {
                const res = await fetch(`/api/orders/${orderId}/cancel`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.id })
                });
                const data = await res.json();
                if(res.ok) {
                    alert(data.message);
                    loadOrders();
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Error cancelling order");
            }
        }

        loadOrders();
    </script>
    <script>
        const header = document.getElementById('site-header');
        window.addEventListener('scroll', () => {
            header.classList.toggle('scrolled', window.scrollY > 50);
        });
        const mobileBtn = document.getElementById('mobile-btn');
        const nav = document.querySelector('nav.menu');
        if(mobileBtn) mobileBtn.addEventListener('click', () => nav.classList.toggle('open'));
    </script>
</body>
</html>
