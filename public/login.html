<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crazy Store</title>
    <script src="https://kit.fontawesome.com/1147679ae7.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px; margin: 120px auto; padding: 30px;
            background: var(--panel); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .auth-container h2 { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 10px; border-radius: 6px; border: none;
            background: rgba(255,255,255,0.05); color: white; outline: none;
        }
        .btn-auth {
            width: 100%; padding: 10px; border-radius: 6px; border: none;
            background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .switch-auth { margin-top: 15px; font-size: 14px; color: var(--muted); }
        .switch-auth a { color: var(--accent); cursor: pointer; text-decoration: underline; }
        .error-msg { color: #ff4757; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <header id="site-header">
        <div class="logo"><a href="index.html"><img src="images/logo.png" alt="Logo"></a></div>
        <nav class="menu"><ul><li><a href="index.html">HOME</a></li></ul></nav>
    </header>

    <div class="auth-container" id="login-form">
        <h2>Sign In</h2>
        <p class="error-msg" id="login-error"></p>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" required>
            </div>
            <button type="submit" class="btn-auth">Login</button>
        </form>
        <p class="switch-auth">Don't have an account? <a onclick="toggleForm()">Sign Up</a></p>
    </div>

    <div class="auth-container" id="register-form" style="display: none;">
        <h2>Create Account</h2>
        <p class="error-msg" id="reg-error"></p>
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-user" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-pass" required>
            </div>
            <button type="submit" class="btn-auth" style="background: #28a745;">Sign Up</button>
        </form>
        <p class="switch-auth">Already have an account? <a onclick="toggleForm()">Sign In</a></p>
    </div>

    <script src="main.js"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const regForm = document.getElementById('register-form');

        function toggleForm() {
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
            }
        }
    </script>
</body>
</html>
