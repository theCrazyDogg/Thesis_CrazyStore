<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crazy Store - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1147679ae7.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: white; }
        .admin-container { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }
        .sidebar { background: #111; padding: 20px; border-right: 1px solid #333; }
        .sidebar button { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background: none; border: none; color: #888; text-align: left; cursor: pointer; transition: 0.2s;}
        .sidebar button:hover { color: white; background: rgba(255,255,255,0.05); }
        .sidebar button.active { color: white; font-weight: bold; border-left: 3px solid var(--accent); background: rgba(255,255,255,0.05); }
        
        .main-panel { padding: 30px; overflow-y: auto;}
        #stats-area { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px;}
        .stats-card { background: #222; padding: 20px; border-radius: 8px; min-width: 200px; margin-bottom: 20px; flex: 1; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #252525; color: var(--accent); }
        tr:hover { background: #222; }

        .action-btn { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: none; font-size: 12px; margin-right: 5px;}
        .delete-btn { background: #ff4757; color: white; }
        .view-btn { background: #3498db; color: white; }
        .edit-btn { background: #f1c40f; color: black; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); overflow: auto; }
        .modal-content { background-color: #222; margin: 5% auto; padding: 25px; border: 1px solid #444; width: 600px; border-radius: 10px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-modal:hover { color: white; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; 
        }
        .btn-submit { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .order-detail-section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .product-list-item { display: flex; align-items: center; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px;}
        .product-list-item img { width: 50px; height: 50px; object-fit: cover; margin-right: 15px; border-radius: 4px;}
        
        .cancelled-text { color: #ff4757; font-weight: bold; padding: 5px; border: 1px solid #ff4757; border-radius: 4px; display: inline-block; font-size: 12px; }
        .delivered-text { color: #2ecc71; font-weight: bold; padding: 5px; border: 1px solid #2ecc71; border-radius: 4px; display: inline-block; font-size: 12px; }
        
        /* CSS cho khu vực biểu đồ */
        .chart-container { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .filter-select { padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; outline: none; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h3 style="color: var(--accent); margin-bottom: 30px; padding-left: 10px;">ADMIN PANEL</h3>
            <button onclick="showTab('income')" class="active" id="btn-income">Manage Income</button>
            <button onclick="showTab('orders')" id="btn-orders">Manage Orders</button>
            <button onclick="showTab('products')" id="btn-products">Manage Products</button>
            <button onclick="showTab('categories')" id="btn-categories">Manage Categories</button>
            <button onclick="showTab('art')" id="btn-art">Manage Art</button> 
            <div style="margin-top: 50px; border-top: 1px solid #333; padding-top: 10px;">
                <button onclick="window.location.href='index.html'">Back to Store</button>
            </div>
        </div>
        
        <div class="main-panel">
            <div id="income-tab" class="tab-content active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Income Overview</h2>
                    <div>
                        <label style="margin-right: 10px; color: #ccc;">Time Range:</label>
                        <select id="time-filter" class="filter-select" onchange="loadStats(this.value)">
                            <option value="7">Last 7 Days</option>
                            <option value="28">Last 28 Days</option>
                            <option value="all">All Time</option>
                        </select>
                    </div>
                </div>

                <div id="stats-area">
                    <div class="stats-card">
                        <h3>Pending Revenue</h3>
                        <h1 id="pending-revenue" style="color: #f1c40f;">$0.00</h1>
                    </div>
                    <div class="stats-card">
                        <h3>Total Revenue</h3>
                        <h1 id="total-revenue" style="color: var(--accent);">$0.00</h1>
                    </div>
                    <div class="stats-card">
                        <h3>Total Orders</h3>
                        <h1 id="total-orders">0</h1>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div class="chart-container">
                        <canvas id="totalRevenueChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="pendingRevenueChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="orders-tab" class="tab-content">
                <h2>All Orders</h2>
                <table>
                    <thead><tr><th>ID</th><th>User</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="orders-table"></tbody>
                </table>
            </div>

            <div id="products-tab" class="tab-content">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>All Products</h2>
                    <button onclick="openProductModal()" style="background: var(--accent); border:none; color:white; padding:10px 15px; border-radius:5px; cursor:pointer;">+ Add Product</button>
                </div>
                <table>
                    <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead>
                    <tbody id="products-table"></tbody>
                </table>
            </div>

            <div id="categories-tab" class="tab-content">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Categories</h2>
                    <button onclick="addCategory()" style="background: var(--accent); border:none; color:white; padding:10px 15px; border-radius:5px; cursor:pointer;">+ Add Category</button>
                </div>
                <table>
                    <thead><tr><th>ID</th><th>Name</th><th>Action</th></tr></thead>
                    <tbody id="categories-table"></tbody>
                </table>
            </div>

            <div id="art-tab" class="tab-content">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>All Artworks</h2>
                    <button onclick="openArtModal()" style="background: var(--accent); border:none; color:white; padding:10px 15px; border-radius:5px; cursor:pointer;">+ Post Art</button>
                </div>
                <table>
                    <thead><tr><th>Image</th><th>Title</th><th>Author</th><th>Type</th><th>Action</th></tr></thead>
                    <tbody id="art-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('productModal').style.display='none'">&times;</span>
            <h2 id="modalTitle">Add New Product</h2>
            <form id="addProductForm" onsubmit="handleProductSubmit(event)">
                <input type="hidden" id="edit-product-id"> 
                <div class="form-group"><label>Name</label><input type="text" id="p-name" required></div>
                <div class="form-group"><label>Price ($)</label><input type="number" id="p-price" step="0.01" required></div>
                <div class="form-group"><label>Stock</label><input type="number" id="p-stock" required></div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="p-category" required><option value="">Select...</option></select>
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" id="p-image" accept="image/*">
                    <input type="hidden" id="current-image-url"> 
                </div>
                <button type="submit" class="btn-submit" id="btn-save-product">Save</button>
            </form>
        </div>
    </div>

    <div id="artModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('artModal').style.display='none'">&times;</span>
            <h2 id="artModalTitle">Post Artwork</h2>
            <form id="addArtForm" onsubmit="handleArtSubmit(event)">
                <input type="hidden" id="edit-art-id"> 
                <div class="form-group"><label>Title</label><input type="text" id="a-title" required></div>
                <div class="form-group"><label>Author</label><input type="text" id="a-author" required></div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="a-type" required>
                        <option value="official">Official Art</option>
                        <option value="fanart">Fanart</option>
                    </select>
                </div>
                <div class="form-group"><label>Description</label><textarea id="a-desc" rows="3"></textarea></div>
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" id="a-image" accept="image/*">
                    <input type="hidden" id="current-art-url"> 
                </div>
                <button type="submit" class="btn-submit" id="btn-save-art">Post Art</button>
            </form>
        </div>
    </div>

    <div id="orderDetailModal" class="modal">
        <div class="modal-content" style="width: 700px;">
            <span class="close-modal" onclick="document.getElementById('orderDetailModal').style.display='none'">&times;</span>
            <h2>Order Details</h2>
            <div id="order-detail-content"></div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('crazy_user'));
        if (!user || user.role !== 'admin') {
            alert("Access Denied!");
            window.location.href = 'index.html';
        }

        let allOrders = [], allProducts = [], allArts = [];
        let editingProductId = null, editingArtId = null;
        
        let totalChartInstance = null;
        let pendingChartInstance = null;

        async function initAdmin() {
            loadStats('7');
            loadOrders();
            loadProducts();
            loadCategories();
            loadArts();
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            document.getElementById('btn-' + tabName).classList.add('active');
        }

        async function loadStats(daysRange) {
            const res = await fetch(`/api/admin/stats?days=${daysRange}`);
            const data = await res.json();
            
            document.getElementById('pending-revenue').innerText = '$' + data.summary.pendingRevenue.toFixed(2);
            document.getElementById('total-revenue').innerText = '$' + data.summary.totalRevenue.toFixed(2);
            document.getElementById('total-orders').innerText = data.summary.totalOrders;

            renderCharts(data.chart);
        }

        function renderCharts(chartData) {
            const commonOptions = {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
                    y: { ticks: { color: '#aaa', callback: function(value){return '$'+value} }, grid: { color: '#333' }, beginAtZero: true }
                }
            };

            if (totalChartInstance) totalChartInstance.destroy();
            if (pendingChartInstance) pendingChartInstance.destroy();

            const ctxTotal = document.getElementById('totalRevenueChart').getContext('2d');
            totalChartInstance = new Chart(ctxTotal, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: 'Total Revenue (Delivered)',
                        data: chartData.totalData,
                        borderColor: '#7c9cff',
                        backgroundColor: 'rgba(124, 156, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: commonOptions
            });

            const ctxPending = document.getElementById('pendingRevenueChart').getContext('2d');
            pendingChartInstance = new Chart(ctxPending, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: 'Pending Revenue',
                        data: chartData.pendingData,
                        borderColor: '#f1c40f',
                        backgroundColor: 'rgba(241, 196, 15, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: commonOptions
            });
        }

        async function loadOrders() {
            const res = await fetch('/api/admin/orders');
            allOrders = await res.json();
            document.getElementById('orders-table').innerHTML = allOrders.map(o => {
                let statusHtml = '';
                if (o.status === 'Cancelled') statusHtml = `<span class="cancelled-text">CANCELLED</span>`;
                else if (o.status === 'Delivered') statusHtml = `<span class="delivered-text">DELIVERED</span>`;
                else statusHtml = `
                    <select onchange="updateStatus('${o._id}', this.value)" style="padding:5px; background:#333; color:white; border:none; border-radius:4px;">
                        <option value="Pending Payment" ${o.status==='Pending Payment'?'selected':''}>Pending Payment</option>
                        <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                        <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                        <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                    </select>`;
                return `<tr><td>${o._id.slice(-6).toUpperCase()}</td><td>${o.full_name}<br><small>${o.user?.email || 'Guest'}</small></td><td>$${o.total_amount.toFixed(2)}</td><td>${statusHtml}</td><td><button class="view-btn action-btn" onclick="viewOrderDetails('${o._id}')">View</button></td></tr>`;
            }).join('');
        }

        async function updateStatus(id, status) {
            await fetch(`/api/admin/orders/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status})});
            loadOrders(); 
            loadStats(document.getElementById('time-filter').value);
        }

        function viewOrderDetails(orderId) {
            const order = allOrders.find(o => o._id === orderId);
            if (!order) return;
            const content = document.getElementById('order-detail-content');
            content.innerHTML = `<div class="order-detail-section"><h3>Info</h3><div>ID: #${order._id.toUpperCase()}</div><div>Status: ${order.status}</div></div>
            <div class="order-detail-section"><h3>Products</h3>${order.items.map(i=>`<div class="product-list-item"><img src="${i.image_url}"><div>${i.name} (x${i.quantity})</div></div>`).join('')}</div>`;
            document.getElementById('orderDetailModal').style.display = 'block';
        }

        async function loadProducts() {
            const res = await fetch('/api/products');
            allProducts = await res.json(); 
            document.getElementById('products-table').innerHTML = allProducts.map(p => `
                <tr><td><img src="${p.image_url}" style="width:40px; height:40px; object-fit:cover;"></td><td>${p.name}</td><td>$${p.price.toFixed(2)}</td><td>${p.stock}</td>
                <td><button class="edit-btn action-btn" onclick="openEditProduct('${p._id}')"><i class="fa fa-edit"></i></button><button class="delete-btn action-btn" onclick="deleteProduct('${p._id}')"><i class="fa fa-trash"></i></button></td></tr>`).join('');
        }

        async function loadCategories() {
            const res = await fetch('/api/categories');
            const cats = await res.json();
            document.getElementById('categories-table').innerHTML = cats.map(c => `<tr><td>${c._id.slice(-6)}</td><td>${c.name}</td><td><button class="delete-btn action-btn" onclick="deleteCategory('${c._id}')">Delete</button></td></tr>`).join('');
            document.getElementById('p-category').innerHTML = '<option value="">Select...</option>' + cats.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
        }
        async function addCategory() {
            const name = prompt("Category Name:");
            if(name) { await fetch('/api/categories', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})}); loadCategories(); }
        }
        async function deleteCategory(id) { if(confirm("Delete category?")) { await fetch(`/api/categories/${id}`, {method:'DELETE'}); loadCategories(); } }

        async function loadArts() {
            const res = await fetch('/api/art'); 
            allArts = await res.json();
            document.getElementById('art-table').innerHTML = allArts.map(a => `
                <tr>
                    <td><img src="${a.image_url}" style="width:40px; height:40px; object-fit:cover; border-radius:4px;"></td>
                    <td>${a.title}</td>
                    <td>${a.author}</td>
                    <td><span style="padding:4px; border-radius:4px; font-size:12px; background:${a.type==='official'?'#3498db':'#9b59b6'}">${a.type}</span></td>
                    <td>
                        <button class="edit-btn action-btn" onclick="openEditArt('${a._id}')"><i class="fa fa-edit"></i></button>
                        <button class="delete-btn action-btn" onclick="deleteArt('${a._id}')"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function openArtModal() {
            editingArtId = null;
            document.getElementById('artModalTitle').innerText = "Post Artwork";
            document.getElementById('btn-save-art').innerText = "Post Art";
            document.getElementById('addArtForm').reset();
            document.getElementById('current-art-url').value = "";
            document.getElementById('artModal').style.display = 'block';
        }

        function openEditArt(id) {
            const art = allArts.find(a => a._id === id);
            if(!art) return;
            editingArtId = id;
            document.getElementById('artModalTitle').innerText = "Edit Artwork";
            document.getElementById('btn-save-art').innerText = "Update Art";
            
            document.getElementById('a-title').value = art.title;
            document.getElementById('a-author').value = art.author;
            document.getElementById('a-type').value = art.type;
            document.getElementById('a-desc').value = art.description;
            document.getElementById('current-art-url').value = art.image_url;
            document.getElementById('a-image').value = "";
            
            document.getElementById('artModal').style.display = 'block';
        }

        async function handleArtSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('a-title').value;
            const author = document.getElementById('a-author').value;
            const type = document.getElementById('a-type').value;
            const description = document.getElementById('a-desc').value;
            const fileInput = document.getElementById('a-image');
            let imageUrl = document.getElementById('current-art-url').value;

            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);
                try {
                    const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
                    const data = await uploadRes.json();
                    imageUrl = data.imageUrl;
                } catch(err) { return alert("Upload failed"); }
            } else if (!imageUrl && !editingArtId) return alert("Please select an image");

            const payload = { title, author, type, description, image_url: imageUrl };
            const url = editingArtId ? `/api/art/${editingArtId}` : '/api/art';
            const method = editingArtId ? 'PUT' : 'POST';

            await fetch(url, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)});
            document.getElementById('artModal').style.display='none';
            loadArts();
        }

        async function deleteArt(id) {
            if(confirm("Delete this artwork?")) {
                await fetch(`/api/art/${id}`, { method: 'DELETE' });
                loadArts();
            }
        }

        function openProductModal() {
            editingProductId = null;
            document.getElementById('modalTitle').innerText = "Add New Product";
            document.getElementById('btn-save-product').innerText = "Add Product";
            document.getElementById('addProductForm').reset();
            document.getElementById('current-image-url').value = "";
            document.getElementById('productModal').style.display = 'block';
        }
        function openEditProduct(id) {
            const p = allProducts.find(x => x._id === id);
            if(!p) return;
            editingProductId = id;
            document.getElementById('modalTitle').innerText = "Edit Product";
            document.getElementById('btn-save-product').innerText = "Update";
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-category').value = p.category;
            document.getElementById('current-image-url').value = p.image_url;
            document.getElementById('productModal').style.display = 'block';
        }
        async function handleProductSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = document.getElementById('p-stock').value;
            const category = document.getElementById('p-category').value;
            const fileInput = document.getElementById('p-image');
            let imageUrl = document.getElementById('current-image-url').value;

            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);
                const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await uploadRes.json();
                imageUrl = data.imageUrl;
            }
            const payload = { name, price: Number(price), stock: Number(stock), category, image_url: imageUrl };
            const url = editingProductId ? `/api/products/${editingProductId}` : '/api/products';
            const method = editingProductId ? 'PUT' : 'POST';
            await fetch(url, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)});
            document.getElementById('productModal').style.display='none';
            loadProducts();
        }
        async function deleteProduct(id) { if(confirm("Delete?")) { await fetch(`/api/products/${id}`, { method: 'DELETE' }); loadProducts(); } }

        initAdmin();
    </script>
</body>
</html>
